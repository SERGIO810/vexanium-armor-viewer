<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexanium Viewer - Terminal J.A.V.I.S. (Integridade Total)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/bundles/skinview3d.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --void-bg: #030508;
            --sculk-base: #0a1117;
            --sculk-surface: #121e29;
            --sculk-glow: #0c8a8c;
            --sculk-core: #13c9c9;
            --warden-bone: #d1d5b4;
            --warden-bone-dim: #8b9172;
            --ai-accent: #ff00ff;
            --calib-accent: #ffaa00;
            --warning: #ff3333;
            --uplink-accent: #00e5ff;
        }

        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'JetBrains Mono', monospace; background: var(--void-bg); user-select: none; color: #fff; }
        #javis-widget-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; border: 1px solid var(--warden-bone-dim); box-sizing: border-box; }
        .viewer-area { flex: 1; position: relative; background: radial-gradient(circle at center, #0a1117 0%, #030508 100%); overflow: hidden; box-shadow: inset 0 0 80px rgba(0,0,0,0.8); }
        
        /* ESTÚDIO DE CIRURGIA UV: 1920x1080 */
        #slicer-modal { width: 98vw; height: 95vh; max-width: 1950px; border-color: var(--calib-accent); }
        .editor-layout { display: flex; flex: 1; gap: 15px; overflow: hidden; }
        .editor-toolbar { flex: 0 0 250px; background: rgba(0,0,0,0.6); border: 1px solid var(--warden-bone-dim); border-radius: 6px; padding: 15px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; box-sizing: border-box;}
        
        /* WORKBENCH & TOOLBAR FIXA */
        .editor-workspace-wrapper { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; border-radius: 6px; background-color: #030508; }
        .editor-workspace { flex: 1; display: flex; overflow: auto; position: relative; padding: 20px; box-sizing: border-box; }
        
        #canvas-wrapper { 
            width: 1920px; height: 1080px; min-width: 1920px; min-height: 1080px; 
            margin: auto; background-color: #0d141c; box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            position: relative; transform-origin: center center;
        }

        #workspace-canvas, #grid-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
        #workspace-canvas { cursor: crosshair; z-index: 10; }
        #grid-canvas { pointer-events: none; z-index: 15; }

        .floating-toolbar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2000;
            background: rgba(10, 17, 23, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(19, 201, 201, 0.4); border-radius: 50px; padding: 10px 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7); display: flex; gap: 6px; align-items: center; justify-content: center;
        }

        .toolbar-btn, .zone-btn {
            width: 40px; height: 40px; border: none; background: transparent; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.3s; color: var(--warden-bone);
        }
        .toolbar-btn:hover, .zone-btn:hover { background: rgba(19, 201, 201, 0.15); transform: scale(1.1); color: var(--sculk-core); }
        .toolbar-btn.active, .zone-btn.active { background: rgba(255, 170, 0, 0.2); color: var(--calib-accent); box-shadow: 0 0 10px rgba(255,170,0,0.3); }
        .toolbar-divider { width: 1px; height: 24px; background: rgba(19, 201, 201, 0.3); margin: 0 8px; }

        /* Tooltips */
        .toolbar-btn::after, .zone-btn::after {
            content: attr(data-tooltip); position: absolute; bottom: calc(100% + 12px); left: 50%; transform: translateX(-50%) translateY(4px);
            background: rgba(5, 10, 15, 0.95); border: 1px solid var(--sculk-core); color: var(--sculk-core); padding: 6px 10px; border-radius: 4px;
            font-size: 10px; font-weight: bold; white-space: nowrap; pointer-events: none; opacity: 0; transition: 0.2s; z-index: 3000; letter-spacing: 1px;
        }
        .toolbar-btn:hover::after, .zone-btn:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }

        .control-bar { background: rgba(6, 10, 14, 0.98); border-top: 1px solid #1a2a3a; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; gap: 12px; z-index: 10; }
        .notification { position: fixed; top: 20px; right: 20px; background: rgba(19, 201, 201, 0.95); border-left: 4px solid #fff; color: #fff; padding: 14px 20px; border-radius: 4px; z-index: 5000; font-size: 12px; font-weight: bold; animation: slideInRight 0.3s ease; }
        .notification.error { background: rgba(255, 51, 51, 0.95); }

        .pieces-panel { flex: 0 0 260px; background: rgba(0,0,0,0.6); border: 1px solid var(--warden-bone-dim); border-radius: 6px; padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .pieces-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .piece-item { background: rgba(18, 30, 41, 0.8); border: 1px solid var(--warden-bone-dim); border-radius: 4px; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .piece-preview { width: 100%; height: 70px; background: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; image-rendering: pixelated; }
        .piece-preview img { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

<div id="javis-widget-container">
    <div class="viewer-area">
        <div id="scanning-overlay"></div>
        <canvas id="skinViewer"></canvas>
        <canvas id="gltfViewer" style="display: none;"></canvas>
    </div>

    <!-- ESTÚDIO DE CIRURGIA UV -->
    <div id="slicer-modal" class="modal" style="display: none;">
        <h3>✂️ BLOCO OPERATÓRIO: MONTAGEM LIVRE <span id="slicer-layer-badge" class="layer-badge">L1</span></h3>
        <div class="editor-layout">
            <div class="editor-toolbar">
                <div class="slice-category">MEMÓRIA & IA</div>
                <button class="btn" style="width:100%; border-color: #ff00ff; color: #ff00ff;" onclick="UIManager.showModal('gen-modal')">✨ GERAR IA</button>
                <div style="display: flex; gap: 5px;">
                    <button class="btn" style="flex: 1;" onclick="StudioCanvas.salvarPresetJSON()">💾 SALVAR</button>
                    <button class="btn" style="flex: 1;" onclick="document.getElementById('file-input-preset').click()">📂 ABRIR</button>
                    <input type="file" id="file-input-preset" accept="application/json" style="display:none">
                </div>
                <div class="slice-category">CORES</div>
                <input type="color" id="color-picker" value="#a855f7" style="width:100%; height:40px; cursor:pointer;">
                <input type="range" id="brush-size" min="1" max="30" value="2" style="width:100%;">
                <div class="slice-category">VISUALIZAÇÃO</div>
                <label style="font-size:10px;"><input type="checkbox" id="show-grid-1x1" onchange="StudioCanvas.drawGridAndMold()"> GRADE 1X1</label>
                <label style="font-size:10px;"><input type="checkbox" id="show-grid-16x16" checked onchange="StudioCanvas.drawGridAndMold()"> GRADE MC</label>
                <label style="font-size:10px;"><input type="checkbox" id="snap-grid" checked> SNAP MAGNÉTICO</label>
            </div>

            <div class="editor-workspace-wrapper">
                <div class="editor-workspace" id="workspace-scroll-area">
                    <div id="canvas-wrapper">
                        <canvas id="grid-canvas" width="1920" height="1080"></canvas>
                        <canvas id="workspace-canvas" width="1920" height="1080"></canvas>
                    </div>
                </div>

                <!-- FLUTUANTE FIXA -->
                <div class="floating-toolbar">
                    <div class="zones-container">
                        <button class="zone-btn active" data-zone="1" data-tooltip="Mestre: 1024x512" onclick="StudioCanvas.switchZone(1)">Z1</button>
                        <button class="zone-btn" data-zone="2" data-tooltip="Interna: 512x256" onclick="StudioCanvas.switchZone(2)">Z2</button>
                        <button class="zone-btn" data-zone="3" data-tooltip="Detalhe: 256x128" onclick="StudioCanvas.switchZone(3)">Z3</button>
                    </div>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn" data-tooltip="Desfazer" onclick="MemoryManager.desfazerEstado()">↩️</button>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn active" id="tool-btn-magic" data-tooltip="Varinha" onclick="ToolManager.setTool('magic')">🪄</button>
                    <button class="toolbar-btn" id="tool-btn-brush" data-tooltip="Pincel" onclick="ToolManager.setTool('brush')">✏️</button>
                    <button class="toolbar-btn" id="tool-btn-move" data-tooltip="Mover" onclick="ToolManager.setTool('move')">🖐️</button>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn" data-tooltip="Zoom Out" onclick="StudioCanvas.ajustarZoom('out')">➖</button>
                    <span id="zoom-label" style="font-size:10px; width:40px; text-align:center;">100%</span>
                    <button class="toolbar-btn" data-tooltip="Zoom In" onclick="StudioCanvas.ajustarZoom('in')">➕</button>
                </div>
            </div>

            <div class="pieces-panel">
                <div class="pieces-header">📦 PEÇAS EXTRAÍDAS</div>
                <div id="pieces-list" class="pieces-list"></div>
                <button class="btn" style="width:100%; margin-top:10px; border-color:var(--sculk-core);" onclick="ExportManager.downloadAllPieces()">📥 BAIXAR ZIP</button>
            </div>
        </div>
        <div class="editor-footer" style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
            <button class="btn" onclick="UIManager.closeModal('slicer-modal')">CANCELAR</button>
            <button class="btn" style="border-color: var(--calib-accent); color: var(--calib-accent);" onclick="ExportManager.aplicarMontagemUVLivre()">✅ FUNDIR (UPSCALE)</button>
        </div>
    </div>

    <!-- BARRA INFERIOR -->
    <div class="control-bar">
        <div class="btn-group">
            <button class="btn active" id="btn-armor" onclick="UIManager.switchMode('armor')">🛡️ ARMADURA</button>
            <button class="btn" id="btn-model" onclick="UIManager.switchMode('model')">👾 ENTIDADE</button>
            <button class="btn" id="btn-item" onclick="UIManager.switchMode('item')">🪄 ARTEFATO</button>
        </div>
        <div class="divider"></div>
        <div class="btn-group">
            <button class="btn" onclick="ExportManager.triggerUpload(1)">📥 CARREGAR L1</button>
            <button class="btn" onclick="StudioCanvas.abrirEstudio()">✂️ ESTÚDIO</button>
        </div>
        <div class="divider"></div>
        <div class="btn-group">
            <button class="btn" onclick="UIManager.showModal('ai-modal')">📊 STATS</button>
            <button class="btn" onclick="UIManager.showModal('gen-modal')">✨ FORJA</button>
        </div>
        <div class="loader" id="ai-loader"></div>
        <a id="javis-branding" href="#"><b>J.A.V.I.S.</b> VEXANIUM VIEWER</a>
    </div>
</div>

<input type="file" id="file-input" style="display:none">

<script>
    const STATE = {
        apiKey: "", currentMode: 'armor', baseImageL1: null, finalImageL1: null,
        extractedPieces: [], activePieceIndex: -1, nextPieceId: 1, currentZoom: 1.0,
        historyUndo: [], currentTool: 'magic', isPainting: false, currentPaintColor: "#a855f7",
        currentMatryoshkaZone: 1,
        matryoshkaZones: {
            1: { w: 1024, h: 512, zoom: 0.7 },
            2: { w: 512,  h: 256, zoom: 1.4 },
            3: { w: 256,  h: 128, zoom: 2.8 }
        }
    };

    const OFFSET_X = 448; const OFFSET_Y = 284;
    const DOM = {
        wsCanvas: document.getElementById('workspace-canvas'),
        gridCanvas: document.getElementById('grid-canvas'),
        canvasWrapper: document.getElementById('canvas-wrapper')
    };

    const wsCtx = DOM.wsCanvas.getContext('2d', { willReadFrequently: true });
    const gCtx = DOM.gridCanvas.getContext('2d');
    let offscreenCanvas = document.createElement('canvas'); offscreenCanvas.width = 1920; offscreenCanvas.height = 1080;
    let offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

    /* --- UI MANAGER --- */
    const UIManager = {
        showNotification: function(msg, type='success') {
            const n = document.createElement('div'); n.className = `notification ${type==='error'?'error':''}`; n.textContent = msg;
            document.body.appendChild(n); setTimeout(() => n.remove(), 3000);
        },
        showModal: function(id) { document.getElementById(id).style.display = 'flex'; },
        closeModal: function(id) { document.getElementById(id).style.display = 'none'; },
        switchMode: function(m) {
            STATE.currentMode = m;
            document.getElementById('btn-armor').classList.toggle('active', m==='armor');
            document.getElementById('gltfViewer').style.display = m==='armor'?'none':'block';
            document.getElementById('skinViewer').style.display = m==='armor'?'block':'none';
            if (m === 'item') { scene.add(cajadoGroup); if (currentModel) scene.remove(currentModel); }
            else if (m === 'model') { scene.remove(cajadoGroup); if (currentModel) scene.add(currentModel); }
            resize();
        }
    };

    /* --- STUDIO ENGINE --- */
    const StudioCanvas = {
        iniciarStudio: function(imgSrc) {
            const img = new Image(); img.onload = () => {
                offscreenCtx.clearRect(0,0,1920,1080);
                offscreenCtx.drawImage(img, 0, 0, img.width, img.height, OFFSET_X, OFFSET_Y, 1024, 512);
                this.renderFatiador(); this.drawGridAndMold();
            }; img.src = imgSrc;
        },
        ajustarZoom: function(v) {
            if (v==='in') STATE.currentZoom *= 1.2; else if (v==='out') STATE.currentZoom *= 0.8; else STATE.currentZoom = v;
            STATE.currentZoom = Math.max(0.4, Math.min(STATE.currentZoom, 5));
            DOM.canvasWrapper.style.transform = `scale(${STATE.currentZoom})`;
            document.getElementById('zoom-label').innerText = Math.round(STATE.currentZoom*100)+'%';
        },
        switchZone: function(z) {
            STATE.currentMatryoshkaZone = z;
            document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-zone="${z}"]`).classList.add('active');
            this.ajustarZoom(STATE.matryoshkaZones[z].zoom);
            this.drawGridAndMold();
        },
        drawGridAndMold: function() {
            gCtx.clearRect(0,0,1920,1080);
            const zone = STATE.matryoshkaZones[STATE.currentMatryoshkaZone];
            const f = zone.w / 64;
            const zX = OFFSET_X + (1024 - zone.w)/2; const zY = OFFSET_Y + (512 - zone.h)/2;
            if(document.getElementById('show-grid-16x16').checked) {
                gCtx.strokeStyle = "rgba(255,255,255,0.1)"; gCtx.beginPath();
                for(let x=0; x<=zone.w; x+=f) { gCtx.moveTo(zX+x, zY); gCtx.lineTo(zX+x, zY+zone.h); }
                for(let y=0; y<=zone.h; y+=f) { gCtx.moveTo(zX, zY+y); gCtx.lineTo(zX+zone.w, zY+y); }
                gCtx.stroke();
            }
            gCtx.strokeStyle = "#ffaa00"; gCtx.setLineDash([10,5]); gCtx.strokeRect(OFFSET_X, OFFSET_Y, 1024, 512); gCtx.setLineDash([]);
            const drawBox = (x,y,w,h,txt) => {
                gCtx.strokeStyle = "#b0279c"; gCtx.strokeRect(zX+x*f, zY+y*f, w*f, h*f);
                gCtx.fillStyle = "#ffaa00"; gCtx.font = "8px monospace"; gCtx.fillText(txt, zX+x*f+2, zY+y*f+8);
            };
            drawBox(8,0,8,8,"CAP"); drawBox(20,16,8,4,"PEI"); drawBox(44,16,4,4,"ARM"); drawBox(4,16,4,4,"BOT");
        },
        renderFatiador: function() {
            wsCtx.clearRect(0,0,1920,1080); wsCtx.drawImage(offscreenCanvas,0,0);
            STATE.extractedPieces.forEach(p => {
                const temp = document.createElement('canvas'); temp.width = p.imgData.width; temp.height = p.imgData.height;
                temp.getContext('2d').putImageData(p.imgData,0,0);
                wsCtx.drawImage(temp, p.x, p.y, p.w, p.h);
            });
        },
        updatePiecesList: function() {
            const list = document.getElementById('pieces-list'); list.innerHTML = '';
            STATE.extractedPieces.forEach((p, i) => {
                const item = document.createElement('div'); item.className = 'piece-item';
                const prev = document.createElement('div'); prev.className = 'piece-preview';
                const temp = document.createElement('canvas'); temp.width = p.imgData.width; temp.height = p.imgData.height;
                temp.getContext('2d').putImageData(p.imgData,0,0);
                const img = new Image(); img.src = temp.toDataURL(); prev.appendChild(img);
                item.appendChild(prev); list.appendChild(item);
            });
        },
        abrirEstudio: function() { UIManager.showModal('slicer-modal'); if(STATE.baseImageL1) this.iniciarStudio(STATE.baseImageL1); }
    };

    /* --- TOOL MANAGER --- */
    const ToolManager = {
        setColor: function(c) { STATE.currentPaintColor = c; document.getElementById('color-picker').value = c; },
        setTool: function(t) { 
            STATE.currentTool = t; 
            document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tool-btn-'+t).classList.add('active');
        },
        aplicarPincelada: function(pos) {
            const size = document.getElementById('brush-size').value;
            offscreenCtx.fillStyle = STATE.currentPaintColor;
            offscreenCtx.fillRect(pos.x - size/2, pos.y - size/2, size, size);
            StudioCanvas.renderFatiador();
        },
        selecaoMagica: function(sx, sy) {
            const w = 1920; const h = 1080; const data = offscreenCtx.getImageData(0,0,w,h).data;
            let minX=sx, maxX=sx, minY=sy, maxY=sy;
            // Algoritmo simplificado de bounding box para extração rápida
            for(let i=sx-20; i<sx+20; i++) { for(let j=sy-20; j<sy+20; j++) { if(data[(j*w+i)*4+3]>20){ minX=Math.min(minX,i); maxX=Math.max(maxX,i); minY=Math.min(minY,j); maxY=Math.max(maxY,j); }}}
            return { x:minX, y:minY, w:maxX-minX+1, h:maxY-minY+1 };
        }
    };

    /* --- EXPORT MANAGER --- */
    const ExportManager = {
        triggerUpload: function(t) { STATE.uploadTarget = t; document.getElementById('file-input').click(); },
        aplicarMontagemUVLivre: function() {
            const zone = STATE.matryoshkaZones[STATE.currentMatryoshkaZone];
            const zX = OFFSET_X + (1024 - zone.w)/2; const zY = OFFSET_Y + (512 - zone.h)/2;
            const temp = document.createElement('canvas'); temp.width = 1024; temp.height = 512;
            const tCtx = temp.getContext('2d'); tCtx.imageSmoothingEnabled = false;
            tCtx.drawImage(DOM.wsCanvas, zX, zY, zone.w, zone.h, 0, 0, 1024, 512);
            STATE.finalImageL1 = temp.toDataURL();
            skinViewer.loadSkin(STATE.finalImageL1).catch(e => console.warn("Erro no skinview3d:", e));
            UIManager.showNotification("SINCRONIZAÇÃO COMPLETA"); UIManager.closeModal('slicer-modal');
        },
        downloadAllPieces: function() { UIManager.showNotification("GERANDO PACOTE ZIP..."); }
    };

    /* --- THREE JS --- */
    const gltfCanvas = document.getElementById('gltfViewer');
    const renderer = new THREE.WebGLRenderer({ canvas: gltfCanvas, alpha: true });
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000); camera.position.z = 5;
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const cajadoGroup = new THREE.Group();
    cajadoGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,4), new THREE.MeshStandardMaterial({color:0x3d2314})));
    scene.add(cajadoGroup);
    function animate() { requestAnimationFrame(animate); if(STATE.currentMode==='item') cajadoGroup.rotation.y += 0.01; renderer.render(scene, camera); }
    animate();

    /* --- SKINVIEW 3D --- */
    const skinViewer = new skinview3d.SkinViewer({ canvas: document.getElementById('skinViewer'), width: 800, height: 600, alpha: true });
    skinViewer.loadSkin('https://crafatar.com/skins/MHF_Steve').catch(() => {});

    /* --- EVENTOS --- */
    DOM.wsCanvas.onmousedown = (e) => {
        const rect = DOM.wsCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (1920/rect.width);
        const y = (e.clientY - rect.top) * (1080/rect.height);
        if(STATE.currentTool === 'brush') STATE.isPainting = true;
        if(STATE.currentTool === 'magic') {
            const box = ToolManager.selecaoMagica(x, y);
            const data = offscreenCtx.getImageData(box.x, box.y, box.w, box.h);
            STATE.extractedPieces.push({ id: STATE.nextPieceId++, imgData: data, x: box.x, y: box.y, w: box.w, h: box.h });
            StudioCanvas.renderFatiador(); StudioCanvas.updatePiecesList();
        }
    };
    DOM.wsCanvas.onmousemove = (e) => {
        if(STATE.isPainting) {
            const rect = DOM.wsCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (1920/rect.width);
            const y = (e.clientY - rect.top) * (1080/rect.height);
            ToolManager.aplicarPincelada({x,y});
        }
    };
    window.onmouseup = () => STATE.isPainting = false;

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader(); reader.onload = (ev) => {
            STATE.baseImageL1 = ev.target.result; StudioCanvas.abrirEstudio();
        }; reader.readAsDataURL(file);
    };

    function resize() {
        const w = window.innerWidth; const h = window.innerHeight;
        skinViewer.width = w; skinViewer.height = h;
        renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
    }
    window.onresize = resize;
    window.onload = () => { resize(); UIManager.showNotification("TERMINAL J.A.V.I.S. ONLINE"); };
</script>

</body>
</html>
