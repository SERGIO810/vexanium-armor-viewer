<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.V.I.S. 3D AI Widget - Reconstruction Mode</title>
    
    <!-- Fonte Técnica -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- Motores 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/bundles/skinview3d.bundle.min.js"></script>
    
    <style>
        :root {
            --void-bg: #030508;
            --sculk-base: #0a1117;
            --sculk-surface: #121e29;
            --sculk-glow: #0c8a8c;
            --sculk-core: #13c9c9;
            --warden-bone: #d1d5b4;
            --warden-bone-dim: #8b9172;
            --ai-accent: #ff00ff;
            --warning: #ff3333;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'JetBrains Mono', monospace;
            background: var(--void-bg);
            user-select: none;
            color: #fff;
        }

        #javis-widget-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            border: 1px solid var(--warden-bone-dim);
            box-sizing: border-box;
            position: relative;
        }

        .viewer-area {
            flex: 1; position: relative;
            background: radial-gradient(circle at center, #0a1117 0%, #030508 100%);
        }

        canvas { width: 100%; height: 100%; cursor: grab; }
        canvas:active { cursor: grabbing; }

        .control-bar {
            background: var(--sculk-base);
            border-top: 1px solid var(--warden-bone-dim);
            padding: 8px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .btn-group { display: flex; gap: 5px; }

        .btn {
            background: var(--sculk-surface);
            color: var(--warden-bone);
            border: 1px solid var(--warden-bone-dim);
            padding: 6px 12px; border-radius: 4px;
            font-size: 11px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
            display: flex; align-items: center; gap: 4px;
        }

        .btn:hover { background: #1f3447; border-color: var(--warden-bone); }
        .btn.active { border-color: var(--sculk-core); color: var(--sculk-core); }
        .btn-ai { border-color: var(--sculk-core); color: var(--sculk-core); box-shadow: 0 0 10px rgba(19, 201, 201, 0.3); }
        .btn-recon { border-color: var(--ai-accent); color: var(--ai-accent); }

        #javis-branding {
            font-size: 9px; color: var(--warden-bone-dim);
            text-decoration: none; display: flex; align-items: center; gap: 5px;
        }
        #javis-branding b { color: var(--sculk-core); }

        #file-input { display: none; }

        #status-overlay {
            position: absolute; top: 10px; left: 10px;
            font-size: 10px; color: var(--sculk-glow);
            pointer-events: none; text-transform: uppercase;
            z-index: 5;
            background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px;
        }

        #ai-modal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 450px;
            background: rgba(10, 17, 23, 0.98);
            border: 2px solid var(--sculk-core);
            padding: 20px; border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            z-index: 100;
            display: none;
            color: var(--warden-bone);
        }

        #ai-modal h3 { color: var(--sculk-core); margin-top: 0; font-size: 14px; border-bottom: 1px solid #1a2a3a; padding-bottom: 10px; }

        #ai-response-text {
            font-size: 12px; line-height: 1.6; margin: 15px 0;
            max-height: 300px; overflow-y: auto;
            white-space: pre-wrap;
        }

        .loader {
            width: 20px; height: 20px; border: 2px solid var(--sculk-core);
            border-top-color: transparent; border-radius: 50%;
            animation: spin 1s linear infinite; display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .close-modal {
            background: var(--sculk-surface); border: 1px solid var(--warden-bone-dim);
            color: #fff; cursor: pointer; width: 100%;
            padding: 10px; font-size: 10px; border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="javis-widget-container">
    <div id="status-overlay">J.A.V.I.S. // Módulo de Reconstrução: ATIVO</div>
    
    <div class="viewer-area">
        <canvas id="skinViewer"></canvas>
        <canvas id="gltfViewer" style="display: none;"></canvas>
    </div>

    <div id="ai-modal">
        <h3 id="modal-title">✨ Relatório de Simbiose</h3>
        <div id="ai-response-text">...</div>
        <button class="close-modal" onclick="closeModal()">Sincronizar e Fechar</button>
    </div>

    <div class="control-bar">
        <div class="btn-group">
            <button class="btn active" id="btn-armor" onclick="switchMode('armor')">🛡️</button>
            <button class="btn" id="btn-model" onclick="switchMode('model')">👾</button>
            <button class="btn" onclick="triggerUpload()">📤</button>
        </div>

        <div class="btn-group">
            <button class="btn btn-ai" onclick="generateLore()">✨ Lore</button>
            <button class="btn btn-recon" onclick="analyzeTexture()">🧠 Alinhar</button>
            <div class="loader" id="ai-loader"></div>
        </div>

        <a id="javis-branding" href="https://sergio810.github.io/vexanium-armor-viewer/" target="_blank">
            Powered by <b>J.A.V.I.S.</b>
        </a>
    </div>
</div>

<input type="file" id="file-input" accept="image/png,.gltf,.glb">

<script>
    const apiKey = ""; // Provisionada em runtime
    let currentMode = 'armor';
    let lastUploadedBase64 = null;
    
    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status-overlay');
    const modal = document.getElementById('ai-modal');
    const aiText = document.getElementById('ai-response-text');
    const loader = document.getElementById('ai-loader');

    // --- SEGURANÇA E INTEGRIDADE ---
    (function(){
        const _0xPR0T = ["sergio810.github.io", "localhost", "127.0.0.1"];
        const _0xLINK = "https://sergio810.github.io/vexanium-armor-viewer/";
        function _0xV3RIFY() {
            const b = document.getElementById('javis-branding');
            if (!b || b.getAttribute('href') !== _0xLINK || !b.innerText.includes('J.A.V.I.S.')) _0xKILL();
        }
        function _0xKILL() {
            document.body.innerHTML = "<div style='color:red; text-align:center; padding-top:20%; font-family:monospace;'><h1>⚠️ ERRO DE INTEGRIDADE ⚠️</h1><p>Violação de Direitos Autorais detetada.</p></div>";
            document.body.style.background = "#000";
            throw new Error("Integrity Check Failed");
        }
        setInterval(_0xV3RIFY, 5000);
    })();

    // --- MOTORES 3D ---
    const skinCanvas = document.getElementById('skinViewer');
    const skinViewer = new skinview3d.SkinViewer({
        canvas: skinCanvas,
        width: skinCanvas.clientWidth,
        height: skinCanvas.clientHeight
    });
    skinViewer.loadSkin('https://crafatar.com/skins/MHF_Steve').catch(() => {});
    skinViewer.controls.autoRotate = true;

    const gltfCanvas = document.getElementById('gltfViewer');
    const renderer = new THREE.WebGLRenderer({ canvas: gltfCanvas, alpha: true, antialias: true });
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
    camera.position.set(0, 0, 5);
    scene.add(new THREE.AmbientLight(0x0c8a8c, 0.6));
    const l1 = new THREE.PointLight(0xd1d5b4, 1.2, 100); l1.position.set(5, 8, 5); scene.add(l1);
    const controls = new THREE.OrbitControls(camera, gltfCanvas);
    controls.enableDamping = true;
    let currentModel = null;

    function animate() {
        requestAnimationFrame(animate);
        if (currentMode === 'model' && currentModel) currentModel.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // --- FUNÇÕES GEMINI AI ---
    async function callGemini(payload) {
        loader.style.display = 'block';
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (e) {
            return "Erro na conexão neural. Verifique o sinal do vácuo.";
        } finally {
            loader.style.display = 'none';
        }
    }

    async function generateLore() {
        modal.style.display = 'block';
        document.getElementById('modal-title').innerText = "✨ ANALISE DE LORE BIOMECÂNICA";
        aiText.innerText = "Sincronizando frequências do Deep Dark...";
        
        const prompt = currentMode === 'armor' 
            ? "Gere uma descrição técnica e lore sombria para uma nova Armadura Vexanium de Minecraft."
            : "Descreva um Mob parasita alienígena para o mod Vexanium.";

        const lore = await callGemini({
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: "Você é J.A.V.I.S., IA do Dr. Aldrich. Tom técnico e sombrio." }] }
        });
        aiText.innerText = lore;
    }

    async function analyzeTexture() {
        if (!lastUploadedBase64 || currentMode !== 'armor') {
            alert("Aviso: Carregue uma textura PNG para iniciar o alinhamento.");
            return;
        }

        modal.style.display = 'block';
        document.getElementById('modal-title').innerText = "🧠 PROTOCOLO DE RECONSTRUÇÃO";
        aiText.innerText = "Analisando malha de textura malestruturada...";

        const prompt = "Analise esta imagem de textura de armadura de Minecraft. Ela parece estar mal estruturada ou desalinhada em relação ao molde 64x32 padrão. Identifique quais partes parecem estar fora do lugar e sugira como o desenvolvedor deve reorganizar as peças (Capacete, Peito, Braços, Botas) para que encaixem corretamente no modelo 3D.";

        const analysis = await callGemini({
            contents: [{ 
                parts: [
                    { text: prompt },
                    { inlineData: { mimeType: "image/png", data: lastUploadedBase64.split(',')[1] } }
                ] 
            }],
            systemInstruction: { parts: [{ text: "Você é um especialista em mapeamento UV de Minecraft e o sistema J.A.V.I.S. Ajude o Operador a consertar texturas desalinhadas." }] }
        });
        aiText.innerText = analysis;
    }

    function closeModal() { modal.style.display = 'none'; }

    // --- CONTROLES ---
    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('btn-armor').classList.toggle('active', mode === 'armor');
        document.getElementById('btn-model').classList.toggle('active', mode === 'model');
        skinCanvas.style.display = mode === 'armor' ? 'block' : 'none';
        gltfCanvas.style.display = mode === 'model' ? 'block' : 'none';
        resize();
    }

    function triggerUpload() { fileInput.click(); }

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        
        if (currentMode === 'armor') {
            const reader = new FileReader();
            reader.onload = (evt) => {
                lastUploadedBase64 = evt.target.result;
                skinViewer.loadSkin(lastUploadedBase64);
                status.innerText = "✓ Textura Assimilada";
            };
            reader.readAsDataURL(file);
        } else {
            new THREE.GLTFLoader().load(url, (gltf) => {
                if (currentModel) scene.remove(currentModel);
                currentModel = gltf.scene;
                scene.add(currentModel);
            });
        }
    };

    function resize() {
        const w = skinCanvas.parentElement.clientWidth;
        const h = skinCanvas.parentElement.clientHeight;
        skinViewer.width = w; skinViewer.height = h;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }
    window.onresize = resize;
    setTimeout(resize, 100);
</script>

</body>
</html>
