<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.V.I.S. 3D AI Widget - Reconstruction Mode</title>
    
    <!-- Fonte Técnica e Tática -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- Motores 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/bundles/skinview3d.bundle.min.js"></script>
    
    <style>
        :root {
            --void-bg: #030508;
            --sculk-base: #0a1117;
            --sculk-surface: #121e29;
            --sculk-glow: #0c8a8c;
            --sculk-core: #13c9c9;
            --warden-bone: #d1d5b4;
            --warden-bone-dim: #8b9172;
            --ai-accent: #ff00ff;
            --calib-accent: #ffaa00;
            --warning: #ff3333;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'JetBrains Mono', monospace;
            background: var(--void-bg);
            user-select: none;
            color: #fff;
        }

        #javis-widget-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            border: 1px solid var(--warden-bone-dim);
            box-sizing: border-box;
            position: relative;
        }

        .viewer-area {
            flex: 1; position: relative;
            background: radial-gradient(circle at center, #0a1117 0%, #030508 100%);
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; cursor: grab; }
        canvas:active { cursor: grabbing; }

        /* Efeito de Scanner Biomecânico */
        #scanning-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--sculk-core);
            box-shadow: 0 0 15px var(--sculk-core), 0 0 30px var(--sculk-core);
            display: none; z-index: 50;
            animation: scanMove 2s infinite ease-in-out;
        }

        @keyframes scanMove {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .control-bar {
            background: var(--sculk-base);
            border-top: 1px solid var(--warden-bone-dim);
            padding: 10px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .btn-group { display: flex; gap: 8px; }

        .btn {
            background: var(--sculk-surface);
            color: var(--warden-bone);
            border: 1px solid var(--warden-bone-dim);
            border-bottom-width: 3px; 
            border-radius: 4px;
            padding: 8px 14px;
            font-size: 12px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
            display: flex; align-items: center; gap: 6px;
        }

        .btn:hover { background: #1f3447; border-color: var(--warden-bone); transform: translateY(-1px); }
        .btn.active { border-color: var(--sculk-core); color: var(--sculk-core); }
        .btn-ai { border-color: var(--sculk-core); color: var(--sculk-core); }
        .btn-recon { border-color: var(--ai-accent); color: var(--ai-accent); border-bottom-color: var(--ai-accent); }
        .btn-calib { border-color: var(--calib-accent); color: var(--calib-accent); border-bottom-color: var(--calib-accent); }

        #javis-branding {
            font-size: 10px; color: var(--warden-bone-dim);
            text-decoration: none; display: flex; align-items: center; gap: 5px;
        }
        #javis-branding b { color: var(--sculk-core); }

        #file-input { display: none; }

        #status-overlay {
            position: absolute; top: 15px; left: 15px;
            font-size: 11px; color: var(--sculk-glow);
            pointer-events: none; text-transform: uppercase;
            z-index: 5; font-weight: 800;
            background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px;
            border-left: 3px solid var(--sculk-core);
        }

        /* MODAIS GERAIS */
        .modal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 480px;
            background: rgba(5, 10, 15, 0.98);
            border: 2px solid var(--sculk-core);
            padding: 25px; border-radius: 8px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(19, 201, 201, 0.1);
            z-index: 100;
            display: none;
            color: var(--warden-bone);
            backdrop-filter: blur(10px);
        }

        .modal h3 { 
            color: var(--sculk-core); margin-top: 0; font-size: 16px; 
            border-bottom: 1px solid rgba(19, 201, 201, 0.3); padding-bottom: 12px;
            display: flex; align-items: center; gap: 10px;
        }

        #ai-response-text {
            font-size: 13px; line-height: 1.6; margin: 20px 0;
            max-height: 320px; overflow-y: auto;
            white-space: pre-wrap; color: var(--text-main);
        }

        /* ESTILOS DO MÓDULO DE CALIBRAÇÃO UV */
        #calib-modal { border-color: var(--calib-accent); max-width: 550px; }
        #calib-modal h3 { color: var(--calib-accent); border-bottom-color: rgba(255, 170, 0, 0.3); }
        
        .uv-container {
            width: 100%; height: 200px;
            background: #222;
            border: 1px solid var(--warden-bone-dim);
            margin: 15px 0;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111), 
                              linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
        }

        #uv-canvas-2d {
            image-rendering: pixelated; /* Mantém os pixels nítidos */
            transform: scale(3); /* Aumenta visualmente sem perder qualidade */
            transform-origin: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .calib-controls {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 120px; margin: 0 auto;
        }

        .calib-btn {
            background: var(--sculk-base); color: var(--calib-accent); border: 1px solid var(--calib-accent);
            padding: 8px; font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        .calib-btn:active { background: var(--calib-accent); color: #000; }
        .calib-btn-empty { visibility: hidden; }

        .close-modal {
            background: var(--sculk-surface); border: 1px solid var(--warden-bone-dim);
            color: #fff; cursor: pointer; width: 100%;
            padding: 12px; font-size: 11px; border-radius: 4px;
            font-weight: 800; text-transform: uppercase; margin-top: 15px;
        }
        .close-modal:hover { background: #1f3447; border-color: #fff; }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--sculk-surface); border-radius: 3px; }

        .loader {
            width: 18px; height: 18px; border: 2px solid var(--sculk-core);
            border-top-color: transparent; border-radius: 50%;
            animation: spin 1s linear infinite; display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body oncontextmenu="return false;">

<div id="javis-widget-container">
    <div id="status-overlay">SISTEMA J.A.V.I.S. // MONITORIZAÇÃO BIOMÉTRICA ATIVA</div>
    
    <div class="viewer-area">
        <div id="scanning-overlay"></div>
        <canvas id="skinViewer"></canvas>
        <canvas id="gltfViewer" style="display: none;"></canvas>
    </div>

    <!-- MODAL IA -->
    <div id="ai-modal" class="modal">
        <h3 id="modal-title">✨ RELATÓRIO DE SINCRONIZAÇÃO</h3>
        <div id="ai-response-text">A extrair dados do hospedeiro...</div>
        <button class="close-modal" onclick="closeModal('ai-modal')">Sincronizar e Sair</button>
    </div>

    <!-- MODAL CALIBRAÇÃO UV -->
    <div id="calib-modal" class="modal">
        <h3>✂️ CALIBRAÇÃO DE MALHA UV</h3>
        <p style="font-size: 10px; color: var(--warden-bone-dim); margin-top: -5px;">Ajuste o offset da imagem gerada pela IA para encaixar no molde 64x32 padrão do Minecraft.</p>
        
        <div class="uv-container">
            <canvas id="uv-canvas-2d" width="64" height="32"></canvas>
        </div>

        <div style="display:flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 10px; color: var(--calib-accent);">
                X: <span id="val-x">0</span>px<br>
                Y: <span id="val-y">0</span>px
            </div>
            
            <div class="calib-controls">
                <div class="calib-btn-empty"></div>
                <button class="calib-btn" onclick="shiftUV(0, -1)">▲</button>
                <div class="calib-btn-empty"></div>
                <button class="calib-btn" onclick="shiftUV(-1, 0)">◀</button>
                <button class="calib-btn" onclick="shiftUV(0, 1)">▼</button>
                <button class="calib-btn" onclick="shiftUV(1, 0)">▶</button>
            </div>
        </div>

        <button class="close-modal" style="border-color: var(--calib-accent);" onclick="applyCalibration()">Aplicar ao Modelo 3D</button>
        <button class="close-modal" style="margin-top: 5px; background: transparent;" onclick="closeModal('calib-modal')">Cancelar</button>
    </div>

    <div class="control-bar">
        <div class="btn-group">
            <button class="btn active" id="btn-armor" onclick="switchMode('armor')" title="Visualizar Armaduras">🛡️</button>
            <button class="btn" id="btn-model" onclick="switchMode('model')" title="Visualizar Entidades">👾</button>
            <button class="btn" onclick="triggerUpload()" title="Carregar Ficheiro">📤</button>
        </div>

        <div class="btn-group">
            <button class="btn btn-ai" onclick="generateLore()">✨ LORE</button>
            <button class="btn btn-recon" id="btn-align" onclick="analyzeTexture()">🧠 ALINHAR</button>
            <button class="btn btn-calib" id="btn-calib" onclick="openCalibration()">✂️ CALIBRAR</button>
            <div class="loader" id="ai-loader"></div>
        </div>

        <a id="javis-branding" href="https://sergio810.github.io/vexanium-armor-viewer/" target="_blank">
            Powered by <b>J.A.V.I.S.</b>
        </a>
    </div>
</div>

<input type="file" id="file-input" accept="image/png,.gltf,.glb">

<script>
    const apiKey = ""; // Provisionada em runtime
    let currentMode = 'armor';
    let lastUploadedBase64 = null;
    
    // Variáveis de Calibração UV
    let uvOffsetX = 0;
    let uvOffsetY = 0;
    let sourceImage = new Image();
    
    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status-overlay');
    const loader = document.getElementById('ai-loader');
    const scanner = document.getElementById('scanning-overlay');

    // --- PROTOCOLO DE INTEGRIDADE ---
    (function(){
        const _0xPR0T = ["sergio810.github.io", "localhost", "127.0.0.1"];
        const _0xLINK = "https://sergio810.github.io/vexanium-armor-viewer/";
        function _0xV3RIFY() {
            const b = document.getElementById('javis-branding');
            if (!b || b.getAttribute('href') !== _0xLINK || !b.innerText.includes('J.A.V.I.S.')) _0xKILL();
        }
        function _0xKILL() {
            document.body.innerHTML = "<div style='color:#ff3333; text-align:center; padding-top:20%; font-family:monospace; background:#000; height:100vh;'><h1>⚠️ ERRO DE INTEGRIDADE ⚠️</h1><p>Violação de Direitos Autorais.</p></div>";
            throw new Error("Integrity Failed");
        }
        setInterval(_0xV3RIFY, 6000);
    })();

    // --- CONFIGURAÇÃO DOS MOTORES 3D ---
    const skinCanvas = document.getElementById('skinViewer');
    const skinViewer = new skinview3d.SkinViewer({
        canvas: skinCanvas,
        width: skinCanvas.clientWidth,
        height: skinCanvas.clientHeight
    });
    skinViewer.loadSkin('https://crafatar.com/skins/MHF_Steve').catch(() => {});
    skinViewer.controls.autoRotate = true;
    skinViewer.controls.autoRotateSpeed = 1.5;

    const gltfCanvas = document.getElementById('gltfViewer');
    const renderer = new THREE.WebGLRenderer({ canvas: gltfCanvas, alpha: true, antialias: true });
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
    camera.position.set(0, 0, 5);
    scene.add(new THREE.AmbientLight(0x0c8a8c, 0.6));
    const l1 = new THREE.PointLight(0xd1d5b4, 1.2, 100); l1.position.set(5, 8, 5); scene.add(l1);
    const controls = new THREE.OrbitControls(camera, gltfCanvas);
    controls.enableDamping = true;
    let currentModel = null;

    function animate() {
        requestAnimationFrame(animate);
        if (currentMode === 'model' && currentModel) currentModel.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // --- MÓDULOS DE IA GEMINI ---
    async function callGemini(payload) {
        loader.style.display = 'block';
        scanner.style.display = 'block';
        let retries = 0; const maxRetries = 5;
        while (retries < maxRetries) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error("Connection failed");
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                retries++; await new Promise(res => setTimeout(res, Math.pow(2, retries) * 1000));
            } finally {
                if (retries === maxRetries || !loader.style.display) {
                    loader.style.display = 'none'; scanner.style.display = 'none';
                }
            }
        }
        return "Falha na recepção neural.";
    }

    async function generateLore() {
        document.getElementById('ai-modal').style.display = 'block';
        document.getElementById('modal-title').innerText = "✨ ANÁLISE DE LORE BIOMECÂNICA";
        document.getElementById('ai-response-text').innerText = "A consultar o diário do Dr. Aldrich...";
        const prompt = currentMode === 'armor' 
            ? "Gere uma descrição técnica e lore sombria para uma Armadura Parasita Alienígena de Minecraft."
            : "Descreva um Mob biomecânico hostil que habita o vácuo profundo do mod Vexanium.";
        const lore = await callGemini({
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: "Você é J.A.V.I.S., IA do Dr. Aldrich. Responda em Português." }] }
        });
        document.getElementById('ai-response-text').innerText = lore;
        scanner.style.display = 'none';
    }

    async function analyzeTexture() {
        if (!lastUploadedBase64 || currentMode !== 'armor') { alert("Carregue uma textura PNG."); return; }
        document.getElementById('ai-modal').style.display = 'block';
        document.getElementById('modal-title').innerText = "🧠 PROTOCOLO DE RECONSTRUÇÃO";
        document.getElementById('ai-response-text').innerText = "A analisar malha de textura e coordenadas UV...";
        const analysis = await callGemini({
            contents: [{ 
                parts: [
                    { text: "Analise esta textura de armadura de Minecraft. Identifique o que está fora do lugar em relação ao molde 64x32 padrão." },
                    { inlineData: { mimeType: "image/png", data: lastUploadedBase64.split(',')[1] } }
                ] 
            }],
            systemInstruction: { parts: [{ text: "Especialista J.A.V.I.S. em mapeamento UV. Ajude a consertar designs." }] }
        });
        document.getElementById('ai-response-text').innerText = analysis;
        scanner.style.display = 'none';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- MÓDULO DE CALIBRAÇÃO 2D (NOVO) ---
    function openCalibration() {
        if (!lastUploadedBase64 || currentMode !== 'armor') { alert("Carregue uma textura PNG para calibrar."); return; }
        uvOffsetX = 0; uvOffsetY = 0;
        document.getElementById('val-x').innerText = uvOffsetX;
        document.getElementById('val-y').innerText = uvOffsetY;
        document.getElementById('calib-modal').style.display = 'block';
        
        sourceImage.onload = () => { renderUVCanvas(); };
        sourceImage.src = lastUploadedBase64;
    }

    function shiftUV(dx, dy) {
        uvOffsetX += dx; uvOffsetY += dy;
        document.getElementById('val-x').innerText = uvOffsetX;
        document.getElementById('val-y').innerText = uvOffsetY;
        renderUVCanvas();
    }

    function renderUVCanvas() {
        const c = document.getElementById('uv-canvas-2d');
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        
        // Desenha a imagem com o offset
        ctx.drawImage(sourceImage, uvOffsetX, uvOffsetY, c.width, c.height);

        // Desenha a Grelha UV Padrão do Minecraft (Sobreposição Translúcida)
        ctx.strokeStyle = "rgba(255, 170, 0, 0.5)"; // Cor de aviso/calibração
        ctx.lineWidth = 1;
        
        // Área da Cabeça
        ctx.strokeRect(0, 0, 32, 16);
        // Área do Peito / Costas
        ctx.strokeRect(16, 16, 24, 16);
        // Braços / Pernas
        ctx.strokeRect(0, 16, 16, 16);
        ctx.strokeRect(40, 16, 16, 16);
    }

    function applyCalibration() {
        const c = document.getElementById('uv-canvas-2d');
        const calibratedBase64 = c.toDataURL("image/png");
        skinViewer.loadSkin(calibratedBase64);
        status.innerText = "✓ MALHA UV RECALIBRADA";
        closeModal('calib-modal');
    }

    // --- CONTROLOS DE INTERFACE ---
    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('btn-armor').classList.toggle('active', mode === 'armor');
        document.getElementById('btn-model').classList.toggle('active', mode === 'model');
        skinCanvas.style.display = mode === 'armor' ? 'block' : 'none';
        gltfCanvas.style.display = mode === 'model' ? 'block' : 'none';
        
        const isArmor = mode === 'armor';
        document.getElementById('btn-align').style.opacity = isArmor ? "1" : "0.3";
        document.getElementById('btn-calib').style.opacity = isArmor ? "1" : "0.3";
        status.innerText = `SISTEMAS: ${mode.toUpperCase()} // IA: STANDBY`;
        resize();
    }

    function triggerUpload() { fileInput.click(); }

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        
        if (currentMode === 'armor' && file.type === "image/png") {
            const reader = new FileReader();
            reader.onload = (evt) => {
                lastUploadedBase64 = evt.target.result;
                skinViewer.loadSkin(lastUploadedBase64);
                status.innerText = "✓ TEXTURA ASSIMILADA";
            };
            reader.readAsDataURL(file);
        } else if (currentMode === 'model') {
            new THREE.GLTFLoader().load(url, (gltf) => {
                if (currentModel) scene.remove(currentModel);
                currentModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(currentModel);
                const size = box.getSize(new THREE.Vector3());
                const scale = 3.5 / Math.max(size.x, size.y, size.z);
                currentModel.scale.set(scale, scale, scale);
                currentModel.position.set(0, -1, 0);
                scene.add(currentModel);
                status.innerText = "✓ GEOMETRIA DE ENTIDADE IMPORTADA";
            });
        }
    };

    function resize() {
        const w = skinCanvas.parentElement.clientWidth;
        const h = skinCanvas.parentElement.clientHeight;
        skinViewer.width = w; skinViewer.height = h;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }
    window.onresize = resize;
    setTimeout(resize, 200);
</script>

</body>
</html>
